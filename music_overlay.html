<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video Player Overlay</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:transparent; font-family: 'Arial', sans-serif; overflow:hidden; }

  #video-wrap {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 360px;
    background: linear-gradient(135deg, rgba(10,10,20,0.95), rgba(20,10,40,0.95));
    border: 1px solid rgba(180,80,255,0.4);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(160,50,255,0.25);
    color: #fff;
  }

  #player-container {
    width: 100%;
    height: 200px;
    background: #000;
    position: relative;
  }

  #youtube-player {
    width: 100%;
    height: 100%;
  }

  .info-wrap {
    padding: 12px 16px;
  }

  .player-label {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #b050ff;
    margin-bottom: 6px;
  }

  .track-title {
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: #fff;
    margin-bottom: 4px;
  }

  .track-user {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 10px;
  }

  .queue-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 6px;
  }

  .queue-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 11px;
  }

  .queue-item:last-child { border-bottom: none; }
  .queue-title { color: rgba(255,255,255,0.7); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 240px; }
  .queue-tokens { color: #b050ff; font-size: 10px; flex-shrink: 0; }

  #unmute-btn {
    position: fixed;
    top: 10px;
    right: 10px;
    background: rgba(180,80,255,0.9);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    z-index: 999;
    box-shadow: 0 0 20px rgba(180,80,255,0.5);
  }

  #waiting {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    text-align: center;
  }
</style>
</head>
<body>

<button id="unmute-btn" onclick="unlockAudio()">🔊 Click to enable sound</button>

<div id="video-wrap">
  <div id="player-container">
    <div id="waiting">🎬 Waiting for requests...<br><small>!video youtube_link</small></div>
    <div id="youtube-player"></div>
  </div>
  <div class="info-wrap">
    <div class="player-label">🎬 Now Playing</div>
    <div class="track-title" id="trackTitle">Waiting for requests...</div>
    <div class="track-user" id="trackUser"></div>
    <div class="queue-label">Up Next</div>
    <div id="queueList"></div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const SERVER = "https://music-bot-production-a9fa.up.railway.app";
let player = null;
let currentSongId = null;
let isPlaying = false;
let audioUnlocked = false;
let pendingSong = null;

function onYouTubeIframeAPIReady() {
  player = new YT.Player('youtube-player', {
    height: '200',
    width: '360',
    playerVars: {
      autoplay: 0,
      controls: 0,
      modestbranding: 1,
      rel: 0
    },
    events: {
      onReady: function() {
        fetchQueue();
      },
      onStateChange: function(e) {
        if (e.data === YT.PlayerState.ENDED) {
          markPlayed();
        }
        if (e.data === YT.PlayerState.PLAYING) {
          document.getElementById('waiting').style.display = 'none';
        }
      },
      onError: function(e) {
        console.error('Player error:', e.data);
        markPlayed();
      }
    }
  });
}

function unlockAudio() {
  audioUnlocked = true;
  document.getElementById('unmute-btn').style.display = 'none';
  if (pendingSong) {
    playSong(pendingSong);
    pendingSong = null;
  } else if (player && isPlaying) {
    player.unMute();
    player.setVolume(100);
  }
}

async function fetchQueue() {
  try {
    const res = await fetch(SERVER + "/queue");
    const queue = await res.json();

    if (queue.length === 0) {
      document.getElementById('trackTitle').textContent = 'Waiting for requests...';
      document.getElementById('trackUser').textContent = '';
      document.getElementById('queueList').innerHTML = '';
      document.getElementById('waiting').style.display = 'block';
      if (player) player.stopVideo();
      isPlaying = false;
      currentSongId = null;
      return;
    }

    if (!isPlaying && queue[0]) {
      if (audioUnlocked) {
        playSong(queue[0]);
      } else {
        pendingSong = queue[0];
        document.getElementById('trackTitle').textContent = queue[0].title;
        document.getElementById('trackUser').textContent = '🎬 requested by ' + queue[0].requested_by;
      }
    }

    const remaining = queue.slice(1);
    document.getElementById('queueList').innerHTML = remaining.slice(0, 3).map(s =>
      '<div class="queue-item">' +
      '<span class="queue-title">' + s.title + '</span>' +
      '<span class="queue-tokens">🪙 ' + s.tokens + '</span>' +
      '</div>'
    ).join('');

  } catch(e) {
    console.error('Error fetching queue:', e);
  }
}

function playSong(song) {
  if (!player) return;
  currentSongId = song.id;
  isPlaying = true;
  player.loadVideoById(song.video_id);
  player.unMute();
  player.setVolume(100);
  player.playVideo();
  document.getElementById('trackTitle').textContent = song.title;
  document.getElementById('trackUser').textContent = '🎬 requested by ' + song.requested_by;
  document.getElementById('waiting').style.display = 'none';
}

async function markPlayed() {
  if (!currentSongId) return;
  await fetch(SERVER + '/played/' + currentSongId, { method: 'POST' });
  currentSongId = null;
  isPlaying = false;
  fetchQueue();
}

setInterval(fetchQueue, 5000);
</script>
</body>
</html>
